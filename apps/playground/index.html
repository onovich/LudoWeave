<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LudoWeave Playground</title>
  </head>
  <body>
    <main id="app">
      <section class="scene" aria-label="LudoWeave runtime scene">
        <div class="scene__world" aria-hidden="true">
          <div class="scene__gate"></div>
          <div class="scene__floor"></div>
        </div>
        <div id="runtime-root"></div>
      </section>
      <section class="action-log" aria-label="ActionRef log">
        <h2>ActionRef log</h2>
        <ol id="action-log" aria-live="polite"></ol>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
