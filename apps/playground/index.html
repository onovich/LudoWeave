<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LudoWeave Playground</title>
  </head>
  <body>
    <main id="app">
      <section class="scene" aria-label="LudoWeave runtime scene">
        <div class="scene__world" aria-hidden="true">
          <div class="scene__gate"></div>
          <div class="scene__floor"></div>
        </div>
        <div id="runtime-root"></div>
      </section>
      <section class="action-log" aria-label="ActionRef log">
        <div class="action-log__header">
          <h2>ActionRef log</h2>
          <label class="action-log__filter">
            <span>Filter</span>
            <select id="action-log-filter" aria-label="ActionRef filter">
              <option value="all">All actions</option>
              <option value="namespace:runtime.gameplay">runtime.gameplay</option>
              <option value="namespace:runtime.objective">runtime.objective</option>
              <option value="namespace:runtime.pause">runtime.pause</option>
              <option value="namespace:runtime.dialogue">runtime.dialogue</option>
              <option value="type:runtime.objective.inspect">runtime.objective.inspect</option>
            </select>
          </label>
        </div>
        <ol id="action-log" aria-live="polite"></ol>
      </section>
      <section
        class="theme-resolution"
        id="theme-resolution"
        aria-label="Theme resolution"
      ></section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
