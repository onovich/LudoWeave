<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LudoWeave Playground</title>
  </head>
  <body>
    <main id="app">
      <section class="scene" aria-label="LudoWeave runtime scene">
        <div class="scene__world" aria-hidden="true">
          <div class="scene__gate"></div>
          <div class="scene__floor"></div>
        </div>
        <div id="runtime-root"></div>
      </section>
      <section class="gate-demo-smoke" aria-label="Sinan Gate Demo">
        <div class="gate-demo-smoke__header">
          <h2>Sinan Gate Demo</h2>
          <span id="gate-demo-status" data-gate-demo-status="pending">Pending</span>
        </div>
        <div class="gate-demo-smoke__stage" id="gate-demo-stage">
          <div class="gate-demo-smoke__world" aria-hidden="true">
            <div class="gate-demo-smoke__gate"></div>
            <div class="gate-demo-smoke__floor"></div>
          </div>
          <div id="gate-demo-runtime-root"></div>
        </div>
      </section>
      <section class="navigation-smoke" aria-label="v0.5 Navigation">
        <div class="navigation-smoke__header">
          <h2>v0.5 Navigation</h2>
          <span id="navigation-status" data-navigation-status="pending">Pending</span>
        </div>
        <div id="navigation-smoke"></div>
      </section>
      <section class="scroll-smoke" aria-label="v0.6 Scroll">
        <div class="scroll-smoke__header">
          <h2>v0.6 Scroll</h2>
          <span id="scroll-status" data-scroll-status="pending">Pending</span>
        </div>
        <div id="scroll-smoke"></div>
      </section>
      <section class="action-log" aria-label="ActionRef log">
        <div class="action-log__header">
          <h2>ActionRef log</h2>
          <label class="action-log__filter">
            <span>Filter</span>
            <select id="action-log-filter" aria-label="ActionRef filter">
              <option value="all">All actions</option>
              <option value="namespace:runtime.gameplay">runtime.gameplay</option>
              <option value="namespace:runtime.objective">runtime.objective</option>
              <option value="namespace:runtime.pause">runtime.pause</option>
              <option value="namespace:runtime.dialogue">runtime.dialogue</option>
              <option value="type:runtime.objective.inspect">runtime.objective.inspect</option>
            </select>
          </label>
          <span class="action-log__commands">
            <button id="action-log-export" type="button">Export JSON</button>
            <button id="action-log-clear" type="button">Clear</button>
          </span>
        </div>
        <ol id="action-log" aria-live="polite"></ol>
        <pre class="action-log__export" id="action-log-export-output" aria-live="polite"></pre>
      </section>
      <section
        class="theme-resolution"
        id="theme-resolution"
        aria-label="Theme resolution"
      ></section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
